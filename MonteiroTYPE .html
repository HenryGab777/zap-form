<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monteiro Burger | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-logo: #205c44;
            --bege-logo: #f9f8f4;
            --amarelo-destaque: #FFC107;
            --whatsapp-green: #25D366;
        }

        body { 
            background-color: var(--bege-logo); 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        .card-container {
            background-color: var(--verde-logo);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 95%;
            max-width: 450px;
            margin: auto;
        }

        /* Suavização das letras e inputs */
        input {
            background-color: rgba(255, 255, 255, 0.98) !important;
            border: 2px solid transparent !important;
            transition: all 0.2s ease-in-out;
            font-size: 16px !important; 
            height: 48px; 
            border-radius: 12px !important;
        }

        input:focus {
            border-color: var(--amarelo-destaque) !important;
            outline: none;
            transform: scale(1.01);
        }

        /* Botão Oficial WhatsApp */
        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px 0 rgba(37, 211, 102, 0.39);
        }

        .btn-whatsapp:hover {
            background-color: #20bd5a;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.23);
        }

        .btn-whatsapp:active {
            transform: scale(0.97);
        }

        label {
            color: var(--amarelo-destaque) !important;
            font-weight: 700 !important;
            letter-spacing: 0.02em;
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: block;
        }

        /* Efeito de vidro suave para o cabeçalho */
        .glass-header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 sm:p-4">

    <div class="card-container rounded-[2rem] p-6 md:p-8 border border-white/5">
        
        <header class="text-center mb-8">
            <div class="inline-block p-4 rounded-full bg-yellow-400/10 mb-4 border border-yellow-400/20">
                <span class="text-4xl">🍔</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-[#FFC107] uppercase tracking-tight italic">
                Endereço de Entrega
            </h1>
            <div class="h-1 w-12 bg-[#FFC107] mx-auto mt-2 rounded-full opacity-50"></div>
        </header>

        <form id="deliveryForm" class="space-y-5">
            <div>
                <label>NOME DO CLIENTE</label>
                <input type="text" id="nome" required class="w-full px-4 text-gray-800" placeholder="Quem recebe">
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label>CEP (OPCIONAL)</label>
                    <input type="number" id="cep" class="w-full px-4 text-gray-800" placeholder="00000000" onblur="buscaCEP()">
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label>RUA</label>
                    <input type="text" id="rua" required class="w-full px-4 text-gray-800" placeholder="Ex: Rua T-32, n 120">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>SETOR/BAIRRO</label>
                        <input type="text" id="bairro" required class="w-full px-4 text-gray-800" placeholder="Ex: Setor bueno">
                    </div>
                    <div>
                        <label>COMPLEMENTO</label>
                        <input type="text" id="ref" class="w-full px-4 text-gray-800" placeholder="Ex: Qd,lote,Apto,Casa...">
                    </div>
                </div>
            </div>

            <button type="button" onclick="pegarLocalizacao()" class="w-full py-3 bg-white/5 border border-[#FFC107]/20 rounded-xl text-[#FFC107] text-[11px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                <span>📍</span> CLIQUE PARA ENVIAR (LOCALIZAÇÃO ATUAL)
            </button>
            <input type="hidden" id="latlong">

            <div class="pt-6">
                <button type="button" onclick="enviarWhatsApp()" class="btn-whatsapp w-full py-4 rounded-2xl font-extrabold text-lg flex items-center justify-center gap-3">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 448 512">
                        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.3-16.3-14.6-27.4-32.7-30.5-38.2-3.2-5.5-.3-8.5 2.4-11.2 2.5-2.6 5.5-6.5 8.3-9.8 2.8-3.2 3.7-5.5 5.5-9.2 1.9-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                    </svg>
                    ENVIAR NO WHATSAPP
                </button>
            </div>
        </form>
    </div>

    <script>
        async function buscaCEP() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length !== 8) return;
            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();
                if (!data.erro) {
                    document.getElementById('rua').value = data.logradouro;
                    document.getElementById('bairro').value = data.bairro;
                }
            } catch (error) { console.error("Erro ao buscar CEP"); }
        }

        function pegarLocalizacao() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    document.getElementById('latlong').value = `${lat},${lon}`;
                    alert("📍 Localização capturada com sucesso!");
                }, () => {
                    alert("⚠️ Por favor, ative o GPS para usarmos sua localização.");
                });
            }
        }

        function enviarWhatsApp() {
            const nome = document.getElementById('nome').value;
            const rua = document.getElementById('rua').value;
            const bairro = document.getElementById('bairro').value;
            const ref = document.getElementById('ref').value;
            const latlong = document.getElementById('latlong').value;

            if(!nome || !rua || !bairro) {
                alert("Por favor, preencha os campos obrigatórios (Nome, Rua e Setor).");
                return;
            }

            const SEU_NUMERO = "5562993768276"; 
            let wazeLink = latlong 
                ? `https://waze.com/ul?ll=${latlong.split(',')[0]},${latlong.split(',')[1]}&navigate=yes`
                : `https://waze.com/ul?q=${encodeURIComponent(rua + ', ' + bairro)}&navigate=yes`;

            const mensagem = `*🍔 ENDEREÇO - MONTEIRO BURGER*%0A%0A` +
                             `👤 *CLIENTE:* ${nome}%0A` +
                             `🏠 *RUA/Nº:* ${rua}%0A` +
                             `🏘️ *SETOR:* ${bairro}%0A` +
                             `🏢 *REF:* ${ref || 'Não informado'}%0A%0A` +
                             `🚙 *ABRIR LOCALIZAÇÃO:*%0A${wazeLink}`;

            window.open(`https://wa.me/${SEU_NUMERO}?text=${mensagem}`, '_blank');
        }
    </script>
</body>
</html>
